server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip básico
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Assets com hash: cache longo
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Healthcheck simples
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # /embed/UUID -> /embed?accountId=UUID (CRM Helena envia accountId no path)
  location ~ ^/embed/([0-9a-fA-F-]{36})$ {
    rewrite ^/embed/([0-9a-fA-F-]{36})$ /embed?accountId=$1 last;
  }

  # SPA fallback: qualquer rota desconhecida volta para index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
